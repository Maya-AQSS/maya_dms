name: Lint (Pint)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pint:
    name: Pint code style + declare_strict_types
    runs-on: ubuntu-latest
    # APP_ENV=testing exime el boot-guard AMQP durante package:discover (sin .env).
    env:
      APP_ENV: testing
      APP_URL: http://localhost
      HOST_PREFIX: ""
      DOMAIN_SUFFIX: test
      MAYA_SLOT: maya
      MAYA_SLOT_DB: ci
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      # Falla si algún archivo no cumple Pint laravel preset + declare_strict_types.
      - name: Run Pint (test mode)
        run: ./vendor/bin/pint app --test
