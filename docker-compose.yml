name: ${MAYA_SLOT_PROJECT:-maya}-dms

services:

  # ─── Backend (Laravel 13) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 768m
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL}
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-maya_dms_db}
      DB_USERNAME: ${DB_USERNAME:-maya_dms_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      # ─── FDW (solo producción, en local las migraciones crean stubs) ─
      FDW_USERS_HOST: ${FDW_USERS_HOST:-}
      FDW_USERS_PORT: ${FDW_USERS_PORT:-5432}
      FDW_USERS_DATABASE: ${FDW_USERS_DATABASE:-}
      FDW_USERS_USERNAME: ${FDW_USERS_USERNAME:-}
      FDW_USERS_PASSWORD: ${FDW_USERS_PASSWORD:-}
      FDW_USERS_SCHEMA: ${FDW_USERS_SCHEMA:-public}
      FDW_USERS_TABLE: ${FDW_USERS_TABLE:-users}
      # ─── Redis ────────────────────────────────────────────────
      CACHE_STORE: redis
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      REDIS_HOST: maya_redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      REDIS_PORT: 6379
      REDIS_DB: 1
      # ─── JWT / JWKS ───────────────────────────────────────────
      JWKS_URL: ${JWKS_URL:-http://maya_auth_keycloak:8080/realms/maya/protocol/openid-connect/certs}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-maya-dms}
      JWT_ISSUER: ${JWT_ISSUER}
      # ─── RabbitMQ ─────────────────────────────────────────────
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      QUEUE_CONNECTION: rabbitmq
      MAYA_MESSAGING_APP: maya-dms
      LOG_STACK: "daily,rabbit"
      LOG_RABBIT_LEVEL: warning
      # ─── Reverb ───────────────────────────────────────────────
      REVERB_APP_ID: ${REVERB_APP_ID:-maya-dms}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8082
      BROADCAST_CONNECTION: reverb
      # ─── CORS ───────────────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - ./backend:/var/www/html
      # Laravel resuelve .env en basePath (/var/www/html); el symlink ../.env no siempre existe o se rompe en bind mount.
      - ./.env:/var/www/html/.env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 150s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-api.rule=Host(`${HOST_PREFIX}dms-api.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-api.service=${MAYA_SLOT_PROJECT}-maya-dms-api"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-api.entrypoints=websecure"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-api.tls=true"
      - "traefik.http.services.${MAYA_SLOT_PROJECT}-maya-dms-api.loadbalancer.server.port=8000"
    networks:
      - maya_network

  # ─── Reverb (WebSockets — notificaciones tiempo real) ──────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL}
      BROADCAST_CONNECTION: reverb
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-maya_dms_db}
      DB_USERNAME: ${DB_USERNAME:-maya_dms_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: maya_redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      REDIS_PORT: 6379
      REVERB_APP_ID: ${REVERB_APP_ID:-maya-dms}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${HOST_PREFIX}dms-reverb.${DOMAIN_SUFFIX}
      REVERB_PORT: 443
      REVERB_SCHEME: https
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      JWKS_URL: ${JWKS_URL:-http://maya_auth_keycloak:8080/realms/maya/protocol/openid-connect/certs}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-maya-dms}
    entrypoint:
      - /bin/sh
      - -c
      - |
        cd /var/www/html
        if [ ! -f vendor/autoload.php ]; then
          echo "[reverb] waiting for vendor (backend composer install)..."
          while [ ! -f vendor/autoload.php ]; do sleep 3; done
        fi
        echo "[reverb] starting reverb server"
        exec php artisan reverb:start --host=0.0.0.0 --port=8080
    command: []
    volumes:
      - ./backend:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -r 'fsockopen(\"127.0.0.1\", 8080) or exit(1);'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-reverb.rule=Host(`${HOST_PREFIX}dms-reverb.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-reverb.service=${MAYA_SLOT_PROJECT}-maya-dms-reverb"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-reverb.entrypoints=websecure"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-reverb.tls=true"
      - "traefik.http.services.${MAYA_SLOT_PROJECT}-maya-dms-reverb.loadbalancer.server.port=8080"
    networks:
      - maya_network

  # ─── Queue worker: reintentos de notificaciones fallidas (DB queue) ──
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-maya_dms_db}
      DB_USERNAME: ${DB_USERNAME:-maya_dms_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      REDIS_HOST: maya_redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      REDIS_PORT: 6379
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      MAYA_MESSAGING_APP: maya-dms
      LOG_STACK: "daily"
      LOG_LEVEL: info
      WORKER_LABEL: "[queue-worker]"
      WORKER_WAIT_MIGRATION: "Running|Ran"
      WORKER_PATCH_CONSUMER: "0"
    entrypoint: ["/maya_infra/scripts/worker-entrypoint.sh"]
    command: []
    volumes:
      - ./backend:/var/www/html
      - ../maya_infra/scripts:/maya_infra/scripts:ro
    networks:
      - maya_network

  # ─── Frontend (React 19 + Vite) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    restart: unless-stopped
    # 2g: Vite bundling de DMS (mayor superficie del ecosistema, 29 services +
    # 21 controllers + features wizard/templates) sobrepasa 768m durante el
    # `optimizeDeps` inicial y recibe SIGKILL. Ver CLAUDE.md para historial.
    mem_limit: 2g
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-maya}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-maya-dms}
      VITE_DASHBOARD_API_URL: ${VITE_DASHBOARD_API_URL:-}
      VITE_DASHBOARD_URL: ${VITE_DASHBOARD_URL:-}
      VITE_REVERB_HOST: ${HOST_PREFIX}dms-reverb.${DOMAIN_SUFFIX}
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
      VITE_REVERB_PORT: 443
      VITE_REVERB_SCHEME: https
    volumes:
      - ./frontend:/app
      - ../maya_infra/configs:/maya_infra/configs:ro
      - /app/node_modules
      # Live source mounts (equivalent to composer.local.json) — overrides installed
      # npm package with the working tree so changes are visible without rebuild.
      - ../maya_platform/packages/js/shared-auth-react:/app/node_modules/@ceedcv-maya/shared-auth-react:ro
      - ../maya_platform/packages/js/shared-dashboard-react:/app/node_modules/@ceedcv-maya/shared-dashboard-react:ro
      - ../maya_platform/packages/js/shared-hooks-react:/app/node_modules/@ceedcv-maya/shared-hooks-react:ro
      - ../maya_platform/packages/js/shared-i18n-react:/app/node_modules/@ceedcv-maya/shared-i18n-react:ro
      - ../maya_platform/packages/js/shared-layout-react:/app/node_modules/@ceedcv-maya/shared-layout-react:ro
      - ../maya_platform/packages/js/shared-profile-react:/app/node_modules/@ceedcv-maya/shared-profile-react:ro
      - ../maya_platform/packages/js/shared-sidebar-react:/app/node_modules/@ceedcv-maya/shared-sidebar-react:ro
      - ../maya_platform/packages/js/shared-styles:/app/node_modules/@ceedcv-maya/shared-styles:ro
      - ../maya_platform/packages/js/shared-ui-react:/app/node_modules/@ceedcv-maya/shared-ui-react:ro
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-front.rule=Host(`${HOST_PREFIX}dms.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-front.service=${MAYA_SLOT_PROJECT}-maya-dms-front"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-front.entrypoints=websecure"
      - "traefik.http.routers.${MAYA_SLOT_PROJECT}-maya-dms-front.tls=true"
      - "traefik.http.services.${MAYA_SLOT_PROJECT}-maya-dms-front.loadbalancer.server.port=5173"
    networks:
      - maya_network

networks:
  maya_network:
    external: true
    name: maya_network
