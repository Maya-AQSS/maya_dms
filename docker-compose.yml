services:

  # ─── Backend (Laravel 13) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maya_dms_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://maya_dms_api.localhost}
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-maya_dms_db}
      DB_USERNAME: ${DB_USERNAME:-maya_dms_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      # ─── FDW (solo producción, en local las migraciones crean stubs) ─
      FDW_USERS_HOST: ${FDW_USERS_HOST:-}
      FDW_USERS_PORT: ${FDW_USERS_PORT:-5432}
      FDW_USERS_DATABASE: ${FDW_USERS_DATABASE:-}
      FDW_USERS_USERNAME: ${FDW_USERS_USERNAME:-}
      FDW_USERS_PASSWORD: ${FDW_USERS_PASSWORD:-}
      FDW_USERS_SCHEMA: ${FDW_USERS_SCHEMA:-public}
      FDW_USERS_TABLE: ${FDW_USERS_TABLE:-users}
      # ─── Redis ────────────────────────────────────────────────
      CACHE_STORE: redis
      REDIS_HOST: maya_redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      REDIS_PORT: 6379
      REDIS_DB: 1
      # ─── JWT / JWKS ───────────────────────────────────────────
      JWKS_URL: ${JWKS_URL:-http://maya_auth_keycloak:8080/realms/maya/protocol/openid-connect/certs}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-maya-dms}
      JWT_ISSUER: ${JWT_ISSUER:-http://keycloak.localhost/realms/maya}
      # ─── RabbitMQ ─────────────────────────────────────────────
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      QUEUE_CONNECTION: rabbitmq
      MAYA_MESSAGING_APP: maya_dms
      LOG_STACK: "daily,rabbit"
      LOG_RABBIT_LEVEL: warning
      # ─── Reverb ───────────────────────────────────────────────
      REVERB_APP_ID: ${REVERB_APP_ID:-maya-dms}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8082
      BROADCAST_CONNECTION: reverb
      # ─── CORS ───────────────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://maya_dms.localhost,http://localhost:5174}
    volumes:
      - ./backend:/var/www/html
      # Laravel resuelve .env en basePath (/var/www/html); el symlink ../.env no siempre existe o se rompe en bind mount.
      - ./.env:/var/www/html/.env
      - ../maya_infra/packages:/var/maya_infra/packages
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 150s
    ports:
      - "${BACKEND_PORT:-8001}:8000"
      - "${REVERB_PORT:-8082}:8082"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maya-dms-api.rule=Host(`maya_dms_api.localhost`)"
      - "traefik.http.routers.maya-dms-api.entrypoints=web"
      - "traefik.http.services.maya-dms-api.loadbalancer.server.port=8000"
    networks:
      - maya_network

  # ─── Queue worker: reintentos de notificaciones fallidas (DB queue) ──
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maya_dms_queue_worker
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-maya_dms_db}
      DB_USERNAME: ${DB_USERNAME:-maya_dms_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      REDIS_HOST: maya_redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      REDIS_PORT: 6379
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      MAYA_MESSAGING_APP: maya_dms
      LOG_STACK: "daily"
      LOG_LEVEL: info
      WORKER_LABEL: "[queue-worker]"
      WORKER_WAIT_MIGRATION: "Running|Ran"
      WORKER_PATCH_CONSUMER: "0"
    entrypoint: ["/maya_infra/scripts/worker-entrypoint.sh"]
    command: []
    volumes:
      - ./backend:/var/www/html
      - ../maya_infra/packages:/var/maya_infra/packages
      - ../maya_infra/scripts:/maya_infra/scripts:ro
    networks:
      - maya_network

  # ─── Frontend (React 19 + Vite) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: maya_dms_frontend
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://maya_dms_api.localhost/api/v1}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://keycloak.localhost}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-maya}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-maya-dms}
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-maya_dms_api.localhost}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT:-8082}
    volumes:
      - ./frontend:/app
      - ../maya_infra/packages:/maya_infra/packages
      - ../maya_infra/configs:/maya_infra/configs:ro
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maya-dms-front.rule=Host(`maya_dms.localhost`)"
      - "traefik.http.routers.maya-dms-front.entrypoints=web"
      - "traefik.http.services.maya-dms-front.loadbalancer.server.port=5173"
    networks:
      - maya_network

networks:
  maya_network:
    external: true
    name: maya_network
