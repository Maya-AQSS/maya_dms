{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maya-dms.fullname" . }}-backend
  labels:
    {{- include "maya-dms.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    {{- include "maya-dms.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    # El backend pod corre un sidecar nginx (puerto 8000) que hace
    # fastcgi_pass al php-fpm (9000). El Service apunta al puerto HTTP,
    # NUNCA directamente al socket FastCGI.
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
{{- end }}
---
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maya-dms.fullname" . }}-frontend
  labels:
    {{- include "maya-dms.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "maya-dms.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
{{- end }}
---
{{- if .Values.reverb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maya-dms.fullname" . }}-reverb
  labels:
    {{- include "maya-dms.labels" . | nindent 4 }}
    app.kubernetes.io/component: reverb
spec:
  type: ClusterIP
  selector:
    {{- include "maya-dms.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: reverb
  ports:
    - name: ws
      port: 8080
      targetPort: ws
      protocol: TCP
{{- end }}
