{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maya-dms.fullname" . }}-backend
  labels:
    {{- include "maya-dms.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollout.maxSurge }}
      maxUnavailable: {{ .Values.rollout.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "maya-dms.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "maya-dms.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        # Forzar rollout cuando cambia ConfigMap o Secret.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/nginx: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.rollout.terminationGracePeriodSeconds }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      securityContext:
        {{- toYaml .Values.securityContext.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Values.backend.containerName }}
          image: {{ include "maya-dms.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext.containerSecurityContext | nindent 12 }}
          ports:
            - name: fastcgi
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            {{- include "maya-dms.envFrom" . | nindent 12 }}
          env:
            - name: CONTAINER_ROLE
              value: {{ .Values.backend.env.CONTAINER_ROLE | quote }}
            {{- include "maya-dms.extraEnv" . | nindent 12 }}
          # Probes contra el endpoint real de salud servido por nginx sidecar
          # → fastcgi → Laravel. tcpSocket sobre 9000 no garantiza app sana.
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.rollout.preStopSleep }}"]
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            {{- include "maya-dms.writableVolumeMounts" . | nindent 12 }}
            {{- include "maya-dms.mediaVolumeMount" . | nindent 12 }}
        # ── nginx sidecar — sirve HTTP/8000 y fastcgi_pass a php-fpm:9000 ────
        - name: nginx
          image: "{{ .Values.backend.nginx.image }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.nginx.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- include "maya-dms.writableVolumes" . | nindent 8 }}
        {{- include "maya-dms.mediaVolume" . | nindent 8 }}
        - name: nginx-config
          configMap:
            name: {{ include "maya-dms.fullname" . }}-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
{{- end }}
