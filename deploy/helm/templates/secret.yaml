{{- /*
Secret de aplicación. Por defecto NO se crea por Helm — se asume gestionado
fuera del chart (kubectl create secret / SealedSecrets / external-secrets).
Activar `secret.create=true` y pasar valores reales con `--set-file` SOLO si
se hace localmente y los valores no se commitean.
*/ -}}
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "maya-dms.secretName" . }}
  labels:
    {{- include "maya-dms.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $key, $value := .Values.secret.data }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
