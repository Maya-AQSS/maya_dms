apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "maya-dms.configMapName" . }}
  labels:
    {{- include "maya-dms.labels" . | nindent 4 }}
  annotations:
    # Renderizar el ConfigMap ANTES del Job de migración para que `php artisan
    # migrate` vea las variables actualizadas (DB_HOST, etc.). Sin esto, los
    # hooks pre-upgrade usarían el ConfigMap del release anterior.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
{{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
